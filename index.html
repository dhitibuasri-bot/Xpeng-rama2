<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-tech Rama 2 Service Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0B0F19; color: #E2E8F0; font-family: 'Prompt', sans-serif; }
        .glass { background: rgba(26, 32, 44, 0.8); backdrop-filter: blur(10px); border: 1px solid #2D3748; border-radius: 20px; }
        mark { background-color: #FFD600; color: black; padding: 0 2px; border-radius: 3px; font-weight: 600; }
        .btn-cyan { background-color: #00D2FF; color: #0B0F19; font-weight: 700; transition: 0.3s; cursor: pointer; }
        .btn-cyan:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-cyan:disabled { background-color: #4A5568; cursor: not-allowed; }
        .card-result:hover { border-color: #00D2FF; transform: scale(1.01); }
    </style>
</head>
<body class="py-12">
    <div class="max-w-4xl mx-auto px-6">
        <header class="text-center mb-10">
            <div class="bg-white px-8 py-4 rounded-3xl shadow-2xl inline-block mb-6 w-full max-w-[320px]">
                <img src="logo.png" class="w-full h-auto object-contain" alt="XPENG Logo">
            </div>
            <h1 class="text-3xl font-bold text-white mb-1 uppercase tracking-tighter">X-tech Rama 2</h1>
            <p class="text-cyan-400 text-sm font-medium uppercase tracking-[0.2em]">Service Support Assistant</p>
        </header>

        <div class="glass p-6 md:p-8 mb-8 shadow-2xl">
            <div class="flex flex-col md:flex-row gap-4">
                <select id="carModel" class="bg-slate-900 border border-slate-700 text-white px-4 py-4 rounded-xl outline-none md:w-1/3 focus:border-cyan-400 transition-all">
                    <option value="G6">XPENG G6 (คู่มือหลัก)</option>
                    <option value="X9">XPENG X9 (คู่มือหลัก)</option>
                    <option value="SCREEN">คู่มือหน้าจอ / การเชื่อมต่อ</option>
                </select>
                <div class="relative flex-grow">
                    <input type="text" id="searchInput" class="w-full bg-slate-900 border border-slate-700 text-white px-6 py-4 rounded-xl outline-none focus:border-cyan-400 transition-all" placeholder="ระบุปัญหาหรือหัวข้อที่ต้องการค้นหา...">
                </div>
                <button id="searchBtn" onclick="doSearch()" class="btn-cyan px-10 py-4 rounded-xl shadow-lg shadow-cyan-500/20">ค้นหาข้อมูล</button>
            </div>
        </div>

        <div id="statusMsg" class="text-center text-gray-400 mb-6 italic min-h-[1.5rem] text-sm">
            ระบบพร้อมสนับสนุนข้อมูลเทคนิค X-tech
        </div>
        
        <div id="resArea" class="hidden space-y-6">
            <div class="flex items-center justify-between border-l-4 border-cyan-400 pl-4 mb-4">
                <h2 class="text-lg font-semibold text-white uppercase tracking-wider">ผลการค้นหาข้อมูลทางเทคนิค</h2>
                <span id="resultCount" class="text-xs bg-cyan-900/50 text-cyan-400 px-3 py-1 rounded-full border border-cyan-800"></span>
            </div>
            <div id="resultsList" class="grid gap-4"></div>
        </div>
    </div>

    <footer class="mt-20 text-center text-gray-600 text-xs">
        &copy; 2024 X-tech Rama 2 Service Support - Technical Information System
    </footer>

    <script>
        // เปลี่ยน URL เป็นของ Render ของคุณ
        const BASE_URL = "https://xpeng-rama2.onrender.com"; 

        function openPdf(model, targetPage) {
            // ระบบจะเปิด PDF ที่ตัดมา 3 หน้า (ก่อน 1 - เป้าหมาย - หลัง 1)
            const pdfUrl = `${BASE_URL}/view/${model}?page=${targetPage}`;
            window.open(pdfUrl, '_blank');
        }

        async function doSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const model = document.getElementById('carModel').value;
            const list = document.getElementById('resultsList');
            const area = document.getElementById('resArea');
            const status = document.getElementById('statusMsg');
            const btn = document.getElementById('searchBtn');
            const resCountLabel = document.getElementById('resultCount');
            
            if (!query) {
                alert("กรุณาพิมพ์คำค้นหา");
                return;
            }

            // UI State - Searching
            btn.disabled = true;
            status.innerHTML = `<span class="flex items-center justify-center gap-2">
                <svg class="animate-spin h-4 w-4 text-cyan-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                X-tech System กำลังค้นหาข้อมูลในคู่มือ...</span>`;
            list.innerHTML = "";
            area.classList.add('hidden');

            try {
                const response = await fetch(`${BASE_URL}/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, model: model })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();
                btn.disabled = false;
                
                if (!data || data.length === 0) {
                    status.innerHTML = "ค้นหาเสร็จสิ้น";
                    area.classList.remove('hidden');
                    resCountLabel.innerHTML = "พบ 0 รายการ";
                    list.innerHTML = `
                        <div class="p-12 text-center text-gray-500 bg-slate-900/50 rounded-3xl border border-dashed border-slate-700">
                            <p class="text-lg mb-2">ไม่พบข้อมูลเกี่ยวกับ "${query}"</p>
                            <p class="text-sm">กรุณาลองใช้คำค้นหาอื่น เช่น "ยาง", "หน้าจอ", "กุญแจ"</p>
                        </div>`;
                } else {
                    status.innerHTML = "";
                    area.classList.remove('hidden');
                    resCountLabel.innerHTML = `พบ ${data.length} รายการ`;

                    data.forEach(item => {
                        // Highlight คำค้นหา
                        const regex = new RegExp(`(${query})`, 'gi');
                        const highlightedText = item.text.replace(regex, '<mark>$1</mark>');

                        const card = document.createElement('div');
                        card.className = 'glass p-6 text-left border-l-4 border-transparent card-result transition-all duration-300 cursor-default';
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="bg-cyan-900/40 text-cyan-400 px-3 py-1 rounded text-[10px] font-bold uppercase tracking-wider">
                                        หน้าคู่มือ: ${item.page}
                                    </span>
                                    <span class="ml-2 text-[10px] text-gray-500 font-bold uppercase">${item.model}</span>
                                </div>
                                <button onclick="openPdf('${item.model}', ${item.page})" class="flex items-center gap-2 text-xs text-cyan-400 hover:text-white transition-colors font-bold group">
                                    <span class="underline underline-offset-4">📌 เปิดอ่าน PDF</span>
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                                </button>
                            </div>
                            <div class="text-gray-300 text-sm leading-relaxed">${highlightedText}</div>
                        `;
                        list.appendChild(card);
                    });
                }
            } catch (error) {
                console.error('Search error:', error);
                btn.disabled = false;
                status.innerHTML = "❌ การเชื่อมต่อ X-tech Server ขัดข้อง กรุณาลองใหม่";
            }
        }

        // รองรับการกด Enter
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doSearch();
        });
    </script>
</body>
</html>
