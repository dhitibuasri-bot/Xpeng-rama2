<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XPENG Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0B0F19; color: #E2E8F0; font-family: 'Prompt', sans-serif; }
        .glass { background: rgba(26, 32, 44, 0.8); backdrop-filter: blur(10px); border: 1px solid #2D3748; border-radius: 20px; }
        mark { background-color: #FFD600; color: black; padding: 0 2px; border-radius: 3px; font-weight: 600; }
        .btn-cyan { background-color: #00D2FF; color: #0B0F19; font-weight: 700; transition: 0.3s; cursor: pointer; }
        .btn-cyan:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-cyan:disabled { background-color: #4A5568; cursor: not-allowed; }
    </style>
</head>
<body class="py-12">
    <div class="max-w-3xl mx-auto px-6">
        <header class="text-center mb-10">
            <div class="bg-white px-8 py-6 rounded-3xl shadow-2xl inline-block mb-6 w-full max-w-[350px]">
                <img src="logo.png" class="w-full h-auto object-contain" alt="XPENG Logo">
            </div>
            <h1 class="text-3xl font-bold text-white mb-2 uppercase">XPENG Assistant</h1>
            <p class="text-gray-500 text-xs tracking-widest uppercase">Rama 2 Service Support</p>
        </header>

        <div class="glass p-8 mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <select id="carModel" class="bg-slate-900 border border-slate-700 text-white px-4 py-3 rounded-xl outline-none md:w-1/3 focus:border-cyan-400">
                    <option value="G6">XPENG G6</option>
                    <option value="X9">XPENG X9</option>
                </select>
                <input type="text" id="searchInput" class="flex-grow bg-slate-900 border border-slate-700 text-white px-6 py-3 rounded-xl outline-none focus:border-cyan-400" placeholder="พิมพ์คำค้นหา...">
                <button id="searchBtn" onclick="doSearch()" class="btn-cyan px-8 py-3 rounded-xl">ค้นหา</button>
            </div>
        </div>

        <div id="statusMsg" class="text-center text-cyan-400 mb-6 italic min-h-[1.5rem]"></div>
        
        <div id="resArea" class="hidden space-y-4">
            <h2 class="text-lg font-medium text-cyan-400 border-l-4 border-cyan-400 pl-3 mb-6">ผลการค้นหา</h2>
            <div id="resultsList" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://xpeng-rama2.onrender.com"; 

        function openPdf(model, targetPage) {
            /** * ระบบใหม่: คำนวณหน้าเป้าหมายในไฟล์ที่ตัดมา 5 หน้า 
             * เช่น ถ้าคลิกหน้า 10, Backend จะส่งหน้า 8, 9, 10, 11, 12 มาให้
             * หน้า 10 จะกลายเป็นหน้าที่ 3 ของไฟล์ใหม่
             */
            const startPage = Math.max(1, targetPage - 2);
            const relativePage = targetPage - startPage + 1;

            // ส่ง ?page= เพื่อดึงไฟล์ และใช้ #page= เพื่อกระโดดไปยังหน้าที่ถูกต้อง
            const pdfUrl = `${BASE_URL}/view/${model}?page=${targetPage}#page=${relativePage}`;
            window.open(pdfUrl, '_blank');
        }

        async function doSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const model = document.getElementById('carModel').value;
            const list = document.getElementById('resultsList');
            const area = document.getElementById('resArea');
            const status = document.getElementById('statusMsg');
            const btn = document.getElementById('searchBtn');
            
            if (!query) return;

            btn.disabled = true;
            status.innerHTML = "กำลังค้นหาและจัดระเบียบตัวอักษร...";
            list.innerHTML = "";
            area.classList.add('hidden');

            try {
                const response = await fetch(`${BASE_URL}/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query, model: model })
                });

                const data = await response.json();
                btn.disabled = false;
                area.classList.remove('hidden');

                if (!data || data.length === 0) {
                    status.innerHTML = "";
                    list.innerHTML = `<div class="p-10 text-center text-gray-400 bg-slate-800/50 rounded-2xl border border-dashed border-slate-600">ไม่พบคำว่า "${query}" ในคู่มือรุ่น ${model}</div>`;
                } else {
                    status.innerHTML = `<span class="text-gray-400 text-xs">พบข้อมูล ${data.length} จุด (เปิดเพื่อดูเนื้อหา 5 หน้าที่เกี่ยวข้อง)</span>`;
                    data.forEach(item => {
                        // Highlight คำค้นหา
                        const regex = new RegExp(`(${query})`, 'gi');
                        const highlightedText = item.text.replace(regex, '<mark>$1</mark>');

                        const card = document.createElement('div');
                        card.className = 'glass p-6 text-left border-l-4 border-transparent hover:border-cyan-400 transition-all cursor-default';
                        card.innerHTML = `
                            <div class="flex justify-between items-center mb-4">
                                <span class="bg-cyan-900/40 text-cyan-400 px-3 py-1 rounded text-[10px] font-bold uppercase tracking-tight">คู่มือหน้า ${item.page}</span>
                                <button onclick="openPdf('${item.model}', ${item.page})" class="text-xs text-cyan-400 hover:text-white transition font-bold flex items-center gap-1">
                                    <span>📌 เปิดอ่านต้นฉบับ</span>
                                </button>
                            </div>
                            <div class="text-gray-300 text-sm leading-relaxed">${highlightedText}</div>
                        `;
                        list.appendChild(card);
                    });
                }
            } catch (error) {
                btn.disabled = false;
                status.innerHTML = "❌ การเชื่อมต่อล้มเหลว กรุณาลองใหม่";
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doSearch();
        });
    </script>
</body>
</html>
